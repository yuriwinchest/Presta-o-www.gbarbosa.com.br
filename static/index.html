<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperBet - Live Tracker (FastAPI + UV)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }

        .match-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .match-card:hover {
            transform: translateY(-4px);
            border-color: #10b981;
            box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.15);
        }

        .odd-btn {
            background: #1e293b;
            border: 1px solid #334155;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .odd-btn:hover {
            background: #10b981;
            border-color: #34d399;
            color: white !important;
            cursor: pointer;
            transform: scale(1.05);
        }

        .live-dot {
            height: 8px;
            width: 8px;
            background-color: #22c55e;
            border-radius: 50%;
            display: inline-block;
            animation: pulse-green 1.5s infinite;
        }

        @keyframes pulse-green {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7);
            }

            70% {
                transform: scale(1);
                box-shadow: 0 0 0 8px rgba(34, 197, 94, 0);
            }

            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(34, 197, 94, 0);
            }
        }

        .odd-up {
            animation: flash-green 1s;
        }

        .odd-down {
            animation: flash-red 1s;
        }

        @keyframes flash-green {
            0% {
                background-color: rgba(34, 197, 94, 0.4);
            }

            100% {
                background-color: transparent;
            }
        }

        @keyframes flash-red {
            0% {
                background-color: rgba(239, 68, 68, 0.4);
            }

            100% {
                background-color: transparent;
            }
        }
    </style>
</head>

<body class="min-h-screen py-8 px-4 sm:px-6 lg:px-8">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-end mb-10 pb-6 border-b border-slate-800">
            <div>
                <h1 class="text-4xl font-black tracking-tighter text-white flex items-center gap-3">
                    <span class="text-emerald-400">UV</span> BetLive
                </h1>
                <p class="text-slate-400 mt-2 text-sm font-medium">Raspagem simulada • Processado com FastAPI em Python
                </p>
            </div>
            <div class="flex items-center gap-3 bg-slate-800/80 px-4 py-2 rounded-full border border-emerald-500/30">
                <span class="live-dot"></span>
                <span class="text-sm font-bold text-emerald-400">ODDs Ao Vivo (Real Time)</span>
            </div>
        </header>

        <div id="loading" class="text-center py-20">
            <div
                class="w-12 h-12 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mx-auto mb-4">
            </div>
            <p class="text-slate-400 font-semibold animate-pulse">Conectando ao Web Scraper...</p>
        </div>

        <div id="matches-container" class="grid gap-5 md:grid-cols-2 lg:grid-cols-2">
            <!-- Partidas serão renderizadas via JavaScript -->
        </div>
    </div>

    <script>
        // Guardamos as cotações anteriores para mostrar a animação de subir ou descer
        let oldOdds = {};

        async function fetchMatches() {
            try {
                const response = await fetch('/api/matches');
                const result = await response.json();

                const container = document.getElementById('matches-container');
                const loading = document.getElementById('loading');

                if (result.status === "success" && result.data.length > 0) {
                    loading.style.display = 'none';

                    let html = '';
                    result.data.forEach((match, index) => {
                        const id = `${match.home}-${match.away}`;

                        // Lógica para ver se as ODDs subiram ou desceram (Efeito Flash)
                        let v1Class = '', xClass = '', v2Class = '';
                        if (oldOdds[id]) {
                            v1Class = match.v1 > oldOdds[id].v1 ? 'odd-up text-emerald-300' : (match.v1 < oldOdds[id].v1 ? 'odd-down text-red-300' : 'text-white');
                            xClass = match.x > oldOdds[id].x ? 'odd-up text-emerald-300' : (match.x < oldOdds[id].x ? 'odd-down text-red-300' : 'text-white');
                            v2Class = match.v2 > oldOdds[id].v2 ? 'odd-up text-emerald-300' : (match.v2 < oldOdds[id].v2 ? 'odd-down text-red-300' : 'text-white');
                        } else {
                            v1Class = xClass = v2Class = 'text-white';
                        }

                        // Salvar estado para a proxima batida
                        oldOdds[id] = { v1: match.v1, x: match.x, v2: match.v2 };

                        html += `
                        <div class="match-card rounded-2xl p-6">
                            <div class="flex justify-between items-center mb-5 text-xs font-bold tracking-wider uppercase">
                                <span class="text-emerald-400 flex items-center gap-2">
                                    <span class="live-dot" style="width:6px; height:6px;"></span> 
                                    ${match.status} ${match.time}
                                </span>
                                <span class="text-slate-500">🏆 Principais Ligas</span>
                            </div>
                            
                            <div class="flex justify-between items-center mb-8">
                                <div class="text-right flex-1 truncate font-extrabold text-xl">${match.home}</div>
                                <div class="px-4 text-2xl font-black text-emerald-400 bg-emerald-950/50 border border-emerald-900 rounded-lg mx-4 py-2 shadow-inner">
                                    ${match.home_score} - ${match.away_score}
                                </div>
                                <div class="text-left flex-1 truncate font-extrabold text-xl">${match.away}</div>
                            </div>
                            
                            <div class="grid grid-cols-3 gap-3">
                                <div class="odd-btn py-3 px-2 rounded-xl flex flex-col items-center">
                                    <span class="text-[10px] text-slate-400 uppercase font-bold tracking-widest mb-1">CASA (1)</span>
                                    <span class="font-black text-lg ${v1Class}">${match.v1.toFixed(2)}</span>
                                </div>
                                <div class="odd-btn py-3 px-2 rounded-xl flex flex-col items-center">
                                    <span class="text-[10px] text-slate-400 uppercase font-bold tracking-widest mb-1">EMPATE (X)</span>
                                    <span class="font-black text-lg ${xClass}">${match.x.toFixed(2)}</span>
                                </div>
                                <div class="odd-btn py-3 px-2 rounded-xl flex flex-col items-center">
                                    <span class="text-[10px] text-slate-400 uppercase font-bold tracking-widest mb-1">FORA (2)</span>
                                    <span class="font-black text-lg ${v2Class}">${match.v2.toFixed(2)}</span>
                                </div>
                            </div>
                        </div>
                        `;
                    });

                    container.innerHTML = html;
                }
            } catch (error) {
                console.error("Erro ao raspar as partidas:", error);
            }
        }

        // Requisição inicial + Loop contínuo a cada 3.5 segundos testando a API
        fetchMatches();
        setInterval(fetchMatches, 3500);
    </script>
</body>

</html>
